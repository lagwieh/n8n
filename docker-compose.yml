services:
  n8n:
    build: .
    container_name: n8n

    ports:
      - "5678:5678"

    environment:
      - TZ=America/Santiago
      - GENERIC_TIMEZONE=America/Santiago
      - N8N_SECURE_COOKIE=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/files
      - NODES_EXCLUDE=[]
      - WEBHOOK_URL=https://importantary-nest-asu-hydraulic.trycloudflare.com
      - N8N_HOST=importantary-nest-asu-hydraulic.trycloudflare.com
      - N8N_PROTOCOL=https

    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./:/files

    restart: unless-stopped
